  </defs>

  <rect x="16" y="16" width="688" height="188" rx="28" fill="url(#panel)"/>
  <rect x="16.75" y="16.75" width="686.5" height="186.5" rx="27.25" stroke="#D8CAB0" stroke-width="1.5"/>

